name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            shell: pwsh
            bootstrap: ./bootstrap.ps1
            compile: ./compile-win64.ps1
          - os: ubuntu-22.04
            shell: bash
            bootstrap: ./bootstrap.sh
            compile: ./compile-linux.sh
          - os: macos-latest
            shell: bash
            bootstrap: ./bootstrap.sh
            compile: ./compile-macos.sh

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Nuitka braucht patchelf fuer den --standalone-Build unter Linux
      - name: Install patchelf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # bootstrap: venv + Deps + Nuitka + Playwright-Chromium
      - name: Bootstrap dev environment
        run: ${{ matrix.bootstrap }}
        shell: ${{ matrix.shell }}

      # compile: Nuitka-Standalone-Build inkl. gebuendeltem Chromium
      - name: Compile standalone binary (Nuitka)
        run: ${{ matrix.compile }}
        shell: ${{ matrix.shell }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/sitemap-generator-v*.zip
            dist/sitemap-generator-v*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.tar.gz
